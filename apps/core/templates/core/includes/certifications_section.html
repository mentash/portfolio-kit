<!-- Certifications Section -->
<section id="certifications" class="py-5 bg-light">
    <div class="container-xl">
        <h2 class="mb-4">Certifications</h2>
        <div class="row g-3">
            {% for cert in profile.certifications.all %}
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">{{ cert.name }}</h5>
                                <span class="badge badge-success">{{ cert.issue_date|date:"Y" }}</span>
                            </div>
                            <p class="card-subtitle text-secondary mb-2">{{ cert.issuer }}</p>
                            {% if cert.description %}
                                <p class="card-text text-secondary mb-0">{{ cert.description }}</p>
                            {% endif %}
                            {% if cert.credential_url %}
                                <a href="{{ cert.credential_url }}" target="_blank" class="card-link">View Credential</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% empty %}
                <p class="text-secondary">No certifications yet.</p>
            {% endfor %}
        </div>
    </div>
</section>
