<!-- Skills Section -->
<section id="skills" class="py-5 bg-light">
    <div class="container-xl">
        <h2 class="mb-4">Skills</h2>
        <div class="row g-3">
            {% for skill in profile.skills.all %}
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">{{ skill.name }}</h5>
                                <span class="badge badge-primary">{{ skill.get_proficiency_display }}</span>
                            </div>
                            <p class="card-text text-secondary mb-0">{{ skill.description }}</p>
                        </div>
                    </div>
                </div>
            {% empty %}
                <p class="text-secondary">No skills yet.</p>
            {% endfor %}
        </div>
    </div>
</section>
