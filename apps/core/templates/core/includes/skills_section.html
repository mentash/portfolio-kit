<section id="skills" class="portfolio-card">
    <h2 class="h3 mb-3">Skills</h2>

    {% if profile.skills.all %}
        <div class="row g-3">
            {% for skill in profile.skills.all %}
                <div class="col-md-6">
                    <div class="d-flex justify-content-between mb-1">
                        <span>{{ skill.name }}</span>
                        <span class="small text-secondary">{{ skill.proficiency }}/10</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar" role="progressbar" style="width: {% widthratio skill.proficiency 10 100 %}%"></div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-secondary mb-0">No skills yet.</p>
    {% endif %}
</section>
