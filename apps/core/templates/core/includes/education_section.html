<section id="education" class="portfolio-card">
    <h2 class="h3 mb-3">Education</h2>

    {% for edu in profile.education.all %}
        <div class="{% if not forloop.last %}pb-3 mb-3 border-bottom{% endif %}">
            <div class="d-flex justify-content-between flex-wrap gap-2">
                <div>
                    <h3 class="h5 mb-1">{{ edu.institution }}</h3>
                    <p class="mb-0 text-secondary">
                        {{ edu.degree }} in {{ edu.field_of_study }}
                    </p>
                </div>
                <span class="small text-secondary">
                    {{ edu.start_date|date:"Y" }} -
                    {% if edu.end_date %}{{ edu.end_date|date:"Y" }}{% else %}Present{% endif %}
                </span>
            </div>
        </div>
    {% empty %}
        <p class="text-secondary mb-0">No education yet.</p>
    {% endfor %}
</section>
